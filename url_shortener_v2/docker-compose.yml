version: '3.8'
 
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-encurtador}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - url_shortener_network
 
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-encurtador}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY não configurada}
    depends_on:
      - db
    networks:
      - url_shortener_network
 
networks:
  url_shortener_network:
    driver: bridge
 
volumes:
  postgres_data:
 